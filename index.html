<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD Live-</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #333; }
        h1 { color: red; margin: 0; }
        #videoList { max-width: 600px; margin: 20px auto; }
        
        .video-card { position: relative; background: #111; border: 1px solid #333; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        video { width: 100%; display: block; background: #000; height: auto; max-height: 450px; cursor: pointer; }
        .title { padding: 15px; font-size: 18px; font-weight: bold; }

        /* অ্যাড লেয়ার - ভিডিওর ওপরেই থাকবে */
        .ad-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: none; /* শুরুতে বন্ধ */
            flex-direction: column; align-items: center; justify-content: center;
        }
        
        iframe { width: 100%; height: 80%; border: none; background: #222; }

        .skip-section {
            width: 100%; height: 20%; background: #111;
            display: flex; align-items: center; justify-content: flex-end; padding-right: 20px;
        }

        .skip-btn {
            padding: 8px 16px; background: rgba(255,255,255,0.1); color: #ccc;
            border: 1px solid #444; border-radius: 4px; font-size: 14px; cursor: not-allowed;
        }

        .skip-btn.active {
            background: #fff; color: #000; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<header><h1>X-WORLD Live-</h1></header>
<div id="videoList"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const videoList = document.getElementById('videoList');
    
    // আপনার ডাইরেক্ট লিঙ্ক
    const myDirectLink = "https://www.profitablecpmratenetwork.com/k0jc7ngbcn?key=6917a323c383b86cb86461e829e27479";

    onSnapshot(query(collection(db, "userVideos"), orderBy("createdAt", "desc")), (snapshot) => {
        videoList.innerHTML = ""; 
        snapshot.forEach((doc) => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div style="position:relative;">
                    <video preload="metadata"><source src="${data.url}#t=0.5" type="video/mp4"></video>
                    
                    <div class="ad-container">
                        <iframe src="${myDirectLink}"></iframe>
                        <div class="skip-section">
                            <button class="skip-btn">Skip Ad in 5s</button>
                        </div>
                    </div>
                </div>
                <div class="title">${data.title}</div>
            `;
            videoList.appendChild(card);

            const video = card.querySelector('video');
            const adContainer = card.querySelector('.ad-container');
            const skipBtn = card.querySelector('.skip-btn');

            // ১. ভিডিওতে ক্লিক করলে অ্যাড লেয়ার আসবে
            video.onclick = function() {
                if(adContainer.style.display !== 'flex') {
                    adContainer.style.display = 'flex';
                    startAdTimer(skipBtn, adContainer, video);
                }
            };
        });
    });

    function startAdTimer(btn, container, vid) {
        let count = 5;
        btn.innerText = `Skip Ad in ${count}s`;
        
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                btn.innerText = `Skip Ad in ${count}s`;
            } else {
                clearInterval(timer);
                btn.innerText = "Skip Ad & Play Video";
                btn.classList.add('active');
                
                btn.onclick = (e) => {
                    e.stopPropagation();
                    container.style.display = 'none';
                    vid.play();
                };
            }
        }, 1000);
    }
</script>
</body>
</html>
