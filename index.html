<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const videoList = document.getElementById('videoList');

    // ১. ইউআরএল থেকে আইডি চেক করা
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');

    if (videoId) {
        // ২. যদি আইডি থাকে, শুধু সেই ভিডিওটি ফায়ারবেস থেকে আনা
        const docRef = doc(db, "userVideos", videoId);
        getDoc(docRef).then((docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                renderVideoCard(data);
            } else {
                videoList.innerHTML = "<h2 style='text-align:center; color:gray;'>ভিডিওটি খুঁজে পাওয়া যায়নি!</h2>";
            }
        }).catch((error) => {
            console.error("Error getting document:", error);
        });
    } else {
        // ৩. যদি আইডি না থাকে, তবে খালি পেজ দেখাবে বা মেসেজ দেবে
        videoList.innerHTML = "<h2 style='text-align:center; color:gray;'>অনুগ্রহ করে সঠিক লিংকে ক্লিক করুন।</h2>";
    }

    // ভিডিও কার্ড রেন্ডার করার ফাংশন
    function renderVideoCard(data) {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
            <div style="position:relative;">
                <video preload="metadata" playsinline>
                    <source src="${data.url}#t=0.5" type="video/mp4">
                </video>
                
                <div class="thumb-overlay">
                    <div class="play-btn">▶</div>
                </div>

                <div class="ad-container">
                    <iframe src="${data.adLink}"></iframe>
                    <div class="skip-section">
                        <span class="timer-text">Wait <span class="sec">5</span>s</span>
                        <button class="skip-btn">Skip Ad</button>
                    </div>
                </div>
            </div>
            <div class="title">${data.title}</div>
        `;
        videoList.appendChild(card);

        // আপনার আগের প্লে এবং স্কিপ লজিক এখানে থাকবে
        setupVideoLogic(card);
    }

    function setupVideoLogic(card) {
        const video = card.querySelector('video');
        const thumbOverlay = card.querySelector('.thumb-overlay');
        const adContainer = card.querySelector('.ad-container');
        const skipBtn = card.querySelector('.skip-btn');
        const secSpan = card.querySelector('.sec');
        const timerText = card.querySelector('.timer-text');

        thumbOverlay.onclick = function() {
            thumbOverlay.style.display = 'none';
            adContainer.style.display = 'flex';
            
            let count = 5;
            const timer = setInterval(() => {
                count--;
                secSpan.innerText = count;
                if (count <= 0) {
                    clearInterval(timer);
                    timerText.style.display = 'none';
                    skipBtn.innerText = "Skip Ad ❯";
                    skipBtn.classList.add('active');
                    
                    skipBtn.onclick = (e) => {
                        e.stopPropagation();
                        adContainer.remove();
                        video.controls = true;
                        video.play();
                    };
                }
            }, 1000);
        };
    }
                                             </script>
