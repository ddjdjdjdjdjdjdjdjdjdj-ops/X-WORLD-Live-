<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD Live-</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #333; }
        h1 { color: red; margin: 0; }
        #videoList { max-width: 600px; margin: 20px auto; }
        
        .video-card { position: relative; background: #111; border: 1px solid #333; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        
        /* Video Controls are visible */
        video { width: 100%; display: block; background: #000; height: auto; max-height: 450px; }

        /* Ad Layer - Video-r opore thakbe kintu controls dhakbe na */
        .ad-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 50px);
            z-index: 10; display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: rgba(0,0,0,0.01);
        }

        .play-center-btn {
            width: 60px; height: 60px; background: rgba(0,0,0,0.4);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #fff; border: 2px solid #fff;
        }

        /* Skip Section - Ekdom YouTube er moto bottom-right e */
        .skip-box {
            position: absolute; bottom: 65px; right: 0;
            z-index: 20; display: none;
        }

        .timer-text {
            background: rgba(0,0,0,0.8); color: #fff; padding: 8px 15px;
            font-size: 13px; border-left: 4px solid red;
        }

        .skip-btn {
            background: #f1f1f1; color: #000; padding: 10px 25px;
            font-size: 14px; font-weight: bold; border: 1px solid #ccc;
            cursor: pointer; display: none;
        }
    </style>
</head>
<body>

<header><h1>X-WORLD Live-</h1></header>
<div id="videoList"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const videoList = document.getElementById('videoList');
    
    // Apnar Adsterra Direct Link
    const myDirectLink = "https://www.profitablecpmratenetwork.com/k0jc7ngbcn?key=6917a323c383b86cb86461e829e27479";

    onSnapshot(query(collection(db, "userVideos"), orderBy("createdAt", "desc")), (snapshot) => {
        videoList.innerHTML = ""; 
        snapshot.forEach((doc) => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div style="position:relative;">
                    <video controls playsinline preload="metadata">
                        <source src="${data.url}#t=0.1" type="video/mp4">
                    </video>
                    
                    <div class="ad-layer">
                        <div class="play-center-btn">▶</div>
                    </div>

                    <div class="skip-box">
                        <div class="timer-text">Ad will end in <span class="sec">5</span>s</div>
                        <button class="skip-btn">Skip Ad ❯</button>
                    </div>
                </div>
                <div class="title">${data.title}</div>
            `;
            videoList.appendChild(card);

            const video = card.querySelector('video');
            const adLayer = card.querySelector('.ad-layer');
            const skipBox = card.querySelector('.skip-box');
            const timerText = card.querySelector('.timer-text');
            const skipBtn = card.querySelector('.skip-btn');
            const secSpan = card.querySelector('.sec');
            const playIcon = card.querySelector('.play-center-btn');

            adLayer.onclick = function() {
                // 1. Direct Link open hobe
                window.open(myDirectLink, '_blank');
                
                // 2. Video chalu hobe kintu ad layer thakbe
                video.play();
                playIcon.style.display = 'none';
                skipBox.style.display = 'block';
                adLayer.style.pointerEvents = 'none'; // Timer cholakalin click bondho

                let timeLeft = 5;
                const timer = setInterval(() => {
                    timeLeft--;
                    secSpan.innerText = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        timerText.style.display = 'none';
                        skipBtn.style.display = 'block';
                    }
                }, 1000);
            };

            skipBtn.onclick = (e) => {
                e.stopPropagation();
                adLayer.remove(); // Ad layer shore jabe
                skipBox.remove(); // Skip button shore jabe
                video.play(); // Pura video dekhbe ebar
            };
        });
    });
</script>
</body>
</html>
