<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD Live-</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #333; }
        h1 { color: red; margin: 0; }
        #videoList { max-width: 600px; margin: 20px auto; }
        
        .video-card { position: relative; background: #111; border: 1px solid #333; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        video { width: 100%; display: block; background: #000; height: auto; max-height: 450px; }
        .title { padding: 15px; font-size: 18px; font-weight: bold; }

        /* অ্যাড ওভারলে - এখন এটি স্বচ্ছ থাকবে যাতে ভিডিওর ছবি দেখা যায় */
        .ad-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1); /* হালকা স্বচ্ছ */
            z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* প্লে আইকন বাটন */
        .play-icon {
            width: 70px; height: 70px; background: rgba(255,0,0,0.8);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .timer-box {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.7); padding: 5px 12px;
            border-radius: 5px; font-size: 14px; border: 1px solid #fff;
            display: none; /* শুরুতে লুকানো থাকবে */
        }

        .skip-btn {
            position: absolute; bottom: 20px; right: 10px;
            padding: 10px 20px; background: red; color: white;
            border: none; border-radius: 5px; font-weight: bold;
            display: none; cursor: pointer;
        }
    </style>
</head>
<body>

<header><h1>X-WORLD Live-</h1></header>

<div id="videoList"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const videoList = document.getElementById('videoList');
    const myDirectLink = "https://www.profitablecpmratenetwork.com/k0jc7ngbcn?key=6917a323c383b86cb86461e829e27479";

    onSnapshot(query(collection(db, "userVideos"), orderBy("createdAt", "desc")), (snapshot) => {
        videoList.innerHTML = ""; 
        snapshot.forEach((doc) => {
            const data = doc.data();
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div style="position:relative;">
                    <video preload="metadata"><source src="${data.url}#t=0.5" type="video/mp4"></video>
                    <div class="ad-overlay">
                        <div class="play-icon">▶</div>
                        <div class="timer-box">Wait <span class="sec">5</span>s</div>
                        <button class="skip-btn">Skip Ad & Play</button>
                    </div>
                </div>
                <div class="title">${data.title}</div>
            `;
            videoList.appendChild(card);

            const overlay = card.querySelector('.ad-overlay');
            const video = card.querySelector('video');
            const playIcon = card.querySelector('.play-icon');
            const timerBox = card.querySelector('.timer-box');
            const skipBtn = card.querySelector('.skip-btn');
            const secText = card.querySelector('.sec');

            overlay.onclick = function() {
                // ১. ক্লিক করলে অ্যাড লিঙ্ক খুলবে
                window.open(myDirectLink, '_blank');
                
                // ২. ক্লিক করার পর টাইমার শুরু হবে
                playIcon.style.display = 'none';
                overlay.style.background = "rgba(0,0,0,0.8)"; // ক্লিক করলে পর্দা কালো হবে
                timerBox.style.display = 'block';
                
                let timeLeft = 5;
                const timer = setInterval(() => {
                    timeLeft--;
                    secText.innerText = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        timerBox.style.display = 'none';
                        skipBtn.style.display = 'block';
                    }
                }, 1000);
            };

            skipBtn.onclick = (e) => {
                e.stopPropagation();
                overlay.remove();
                video.play();
            };
        });
    });
</script>
</body>
</html>
