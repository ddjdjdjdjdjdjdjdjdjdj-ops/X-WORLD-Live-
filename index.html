<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="monetag" content="38de9411d020ddc105ced3c89777b600">
    <title>X-WORLD Live-</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #333; }
        h1 { color: red; margin: 0; }
        #videoList { max-width: 600px; margin: 20px auto; }
        .video-card { background: #111; border: 1px solid #333; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        video { width: 100%; display: block; background: #000; height: auto; max-height: 450px; }
        .title { padding: 15px; font-size: 18px; font-weight: bold; border-top: 1px solid #222; }
        .no-data { text-align: center; color: #666; margin-top: 50px; }
        
        /* অ্যাড স্টাইল */
        .ad-slot { 
            background: #1a1a1a; 
            margin-bottom: 20px; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            border: 1px dashed #444;
        }
        .ad-label { color: #666; font-size: 10px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<header><h1>X-WORLD Live-</h1></header>

<div id="videoList">
    <div class="no-data" id="status">ভিডিও খোঁজা হচ্ছে...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const videoList = document.getElementById('videoList');
    const status = document.getElementById('status');

    // ডাটাবেস থেকে ভিডিও আনা
    const q = query(collection(db, "userVideos"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
            status.innerText = "এখনো কোনো ভিডিও আপলোড করা হয়নি।";
            return;
        }

        videoList.innerHTML = ""; 
        let videoCount = 0;

        snapshot.forEach((doc) => {
            const data = doc.data();
            videoCount++;

            // ১. ভিডিও কার্ড তৈরি
            const videoDiv = document.createElement('div');
            videoDiv.className = 'video-card';
            videoDiv.innerHTML = `
                <video controls>
                    <source src="${data.url}" type="video/mp4">
                    আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
                </video>
                <div class="title">${data.title}</div>
            `;
            videoList.appendChild(videoDiv);

            // ২. প্রতি ২টা ভিডিওর পর আপনার Adsterra অ্যাড বসানো
            if (videoCount % 2 === 0) {
                const adDiv = document.createElement('div');
                adDiv.className = 'ad-slot';
                
                // এখানে আপনার দেওয়া অ্যাড কোডগুলো ইনজেক্ট করা হচ্ছে
                adDiv.innerHTML = `
                    <span class="ad-label">SPONSORED</span>
                    
                    <div id="ad-300x250-${videoCount}"></div>
                    
                    <div id="ad-native-${videoCount}" style="margin-top:15px;"></div>
                `;
                videoList.appendChild(adDiv);

                // অ্যাড স্ক্রিপ্ট রান করানো
                // ৩00x250 script
                const s1 = document.createElement('script');
                s1.type = 'text/javascript';
                s1.text = `
                    atOptions = {
                        'key' : '6dd42e61fdb77100ae25a4653ee62d7f',
                        'format' : 'iframe',
                        'height' : 250,
                        'width' : 300,
                        'params' : {}
                    };
                `;
                adDiv.querySelector(\`#ad-300x250-\${videoCount}\`).appendChild(s1);

                const s2 = document.createElement('script');
                s2.type = 'text/javascript';
                s2.src = 'https://www.highperformanceformat.com/6dd42e61fdb77100ae25a4653ee62d7f/invoke.js';
                adDiv.querySelector(\`#ad-300x250-\${videoCount}\`).appendChild(s2);

                // Native Network script
                const s3 = document.createElement('script');
                s3.async = true;
                s3.src = 'https://pl29076747.profitablecpmratenetwork.com/938f6cade40341aab3d3c0d9e92a53bc/invoke.js';
                adDiv.querySelector(\`#ad-native-\${videoCount}\`).appendChild(s3);
            }
        });
    }, (error) => {
        status.innerText = "Error: " + error.message;
    });
</script>
</body>
</html>
