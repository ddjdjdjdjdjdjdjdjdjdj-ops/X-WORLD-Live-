<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="exoclick-site-verification" content="857420cd1419e7706adc3ef6cfdd3851">
    
    <title>X-WORLD Live</title>
    
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        #main-content { display: flex; flex-direction: column; align-items: center; padding: 10px; }
        header { text-align: center; padding: 20px; width: 100%; border-bottom: 1px solid #333; }
        h1 { color: red; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .v-card { width: 100%; max-width: 500px; margin-top: 20px; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #333; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .title { padding: 15px; font-size: 18px; font-weight: bold; text-align: center; color: #eee; }
        #video-player { width: 100%; height: auto; }
    </style>
</head>
<body>

<div id="main-content">
    <header><h1>X-WORLD Live</h1></header>
    <div id="vBox" style="margin-top: 50px;">ভিডিও লোড হচ্ছে...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const vBox = document.getElementById('vBox');

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (id) {
        async function load() {
            try {
                const s = await getDoc(doc(db, "userVideos", id));
                if (s.exists()) {
                    const d = s.data();
                    vBox.innerHTML = `
                        <div class="v-card">
                            <video id="video-player">
                                <source src="${d.url}" type="video/mp4" />
                            </video>
                            <div class="title">${d.title}</div>
                        </div>`;
                    
                    fluidPlayer('video-player', {
                        layoutControls: {
                            fillControlBar: true,
                            autoPlay: true,
                            mute: true,
                            allowTheatre: true
                        },
                        vastOptions: {
                            skipButtonCaption: 'Skip Ad in [seconds]s',
                            skipButtonClickCaption: 'Skip Ad',
                            adClickable: true,
                            adText: 'Advertisement',
                            adList: [
                                {
                                    roll: 'preRoll',
                                    vastTag: 'YOUR_EXOCLICK_VAST_TAG_HERE', // সাইট ভেরিফাই হলে এখানে ট্যাগ বসাবেন
                                    timer: 5 
                                }
                            ]
                        }
                    });

                } else {
                    vBox.innerHTML = "ভিডিও পাওয়া যায়নি!";
                }
            } catch (err) {
                vBox.innerHTML = "লোডিং এরর!";
            }
        }
        load();
    }
</script>

</body>
</html>
