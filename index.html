<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD Live-</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #333; }
        h1 { color: red; margin: 0; }
        #videoList { max-width: 600px; margin: 20px auto; }
        
        .video-card { position: relative; background: #111; border: 1px solid #333; border-radius: 10px; margin-bottom: 25px; overflow: hidden; min-height: 250px;}
        video { width: 100%; display: none; background: #000; height: auto; max-height: 450px; }
        .title { padding: 15px; font-size: 18px; font-weight: bold; }

        /* অ্যাড ওভারলে স্টাইল */
        .ad-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .timer-box {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.2); padding: 5px 12px;
            border-radius: 5px; font-size: 14px; border: 1px solid #555;
        }
        .play-btn {
            padding: 12px 25px; background: #222; color: #666;
            border: 1px solid #444; border-radius: 5px; font-weight: bold;
            text-transform: uppercase; cursor: not-allowed; transition: 0.3s;
        }
        .skip-active {
            background: red !important; color: white !important;
            border-color: #fff !important; cursor: pointer !important;
            box-shadow: 0 0 20px rgba(255,0,0,0.6);
        }
    </style>
</head>
<body>

<header><h1>X-WORLD Live-</h1></header>

<div id="videoList">
    <div id="status" style="text-align:center; margin-top:50px; color:#888;">ভিডিও লোড হচ্ছে...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const videoList = document.getElementById('videoList');

    // আপনার দেওয়া ডাইরেক্ট লিঙ্কটি এখানে সেট করা হয়েছে
    const myDirectLink = "https://www.profitablecpmratenetwork.com/k0jc7ngbcn?key=6917a323c383b86cb86461e829e27479";

    onSnapshot(query(collection(db, "userVideos"), orderBy("createdAt", "desc")), (snapshot) => {
        if (snapshot.empty) {
            document.getElementById('status').innerText = "কোনো ভিডিও পাওয়া যায়নি।";
            return;
        }
        videoList.innerHTML = ""; 
        snapshot.forEach((doc) => {
            const data = doc.data();
            createVideoCard(data);
        });
    });

    function createVideoCard(data) {
        const card = document.createElement('div');
        card.className = 'video-card';
        
        card.innerHTML = `
            <div class="video-container" style="position:relative; width:100%; height:250px; background:#000;">
                <video controls><source src="${data.url}" type="video/mp4"></video>
                <div class="ad-overlay">
                    <div class="timer-box">Wait <span class="sec">5</span>s</div>
                    <div style="text-align:center; margin-bottom:15px;">
                        <p style="color:red; font-size:18px; font-weight:bold; margin:0;">VIDEO LOCKED</p>
                        <p style="font-size:11px; color:#aaa;">ভিডিও দেখতে এখানে ক্লিক করুন</p>
                    </div>
                    <button class="play-btn">Unlock Video</button>
                </div>
            </div>
            <div class="title">${data.title}</div>
        `;
        videoList.appendChild(card);

        const overlay = card.querySelector('.ad-overlay');
        const video = card.querySelector('video');
        const skipBtn = card.querySelector('.play-btn');
        const secText = card.querySelector('.sec');
        const container = card.querySelector('.video-container');
        
        let timeLeft = 5;
        let canSkip = false;

        // ১. ভিডিওর ওপর ক্লিক করলে ডাইরেক্ট লিঙ্ক ওপেন হবে
        overlay.onclick = function() {
            window.open(myDirectLink, '_blank');
        };

        // ২. ৫ সেকেন্ডের টাইমার কাউন্টডাউন
        const timer = setInterval(() => {
            timeLeft--;
            secText.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                canSkip = true;
                card.querySelector('.timer-box').style.display = 'none';
                skipBtn.innerText = "Skip Ad & Play Video";
                skipBtn.classList.add('skip-active');
                
                // ৩. স্কিপ বাটনে ক্লিক করলে অ্যাড সরবে এবং ভিডিও আসবে
                skipBtn.onclick = (e) => {
                    e.stopPropagation(); // যাতে আবার ডাইরেক্ট লিঙ্ক না খুলে
                    overlay.remove();
                    container.style.height = "auto";
                    video.style.display = "block";
                    video.play();
                };
            }
        }, 1000);
    }
</script>
</body>
</html>
