<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD | Video</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; text-align: center; }
        #vBox { width: 100%; max-width: 600px; margin: 20px auto; position: relative; }
        
        /* অদৃশ্য পর্দা যা প্লেয়ারের উপরে থাকবে */
        #ad-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.1); /* হালকা পর্দা যাতে ভিডিওর থাম্বনেইল দেখা যায় */
            z-index: 9999; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }

        /* প্লে আইকন (ঐচ্ছিক, ইউজারকে বোঝাতে যে এখানে ক্লিক করতে হবে) */
        .play-icon {
            width: 70px; height: 70px; background: rgba(255,0,0,0.8);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        video { width: 100%; display: block; border-radius: 8px; background: #000; }
        .v-title { padding: 15px; font-size: 18px; color: #ccc; }
    </style>
</head>
<body>

<div id="vBox">
    <div class="v-title" id="videoTitle">ভিডিও লোড হচ্ছে...</div>
    
    <div style="position: relative; background: #000; min-height: 250px;">
        <div id="ad-overlay">
            <div class="play-icon">▶</div>
        </div>

        <video id="mainVideo" controls playsinline></video>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // আপনার Monetag Direct Link এখানে বসান
    const monetagLink = "YOUR_MONETAG_DIRECT_LINK_HERE"; 

    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');

    async function loadVideo() {
        if (!videoId) return;

        try {
            const docRef = doc(db, "userVideos", videoId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('videoTitle').innerText = data.title;
                const videoElement = document.getElementById('mainVideo');
                videoElement.src = data.url;

                const overlay = document.getElementById('ad-overlay');

                // পর্দার ওপর ক্লিক করলে যা হবে
                overlay.onclick = () => {
                    // ১. Monetag অ্যাড ওপেন হবে নতুন ট্যাবে
                    window.open(monetagLink, '_blank');
                    
                    // ২. পর্দাটি সাথে সাথে মুছে যাবে
                    overlay.style.display = 'none';
                    
                    // ৩. ভিডিও চলতে শুরু করবে
                    videoElement.play();
                };

            } else {
                document.getElementById('videoTitle').innerText = "ভিডিও পাওয়া যায়নি!";
            }
        } catch (e) {
            console.log("Error:", e);
        }
    }

    loadVideo();
</script>
</body>
</html>
