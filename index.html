<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD | Player</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; text-align: center; }
        #vBox { width: 100%; max-width: 600px; margin: 20px auto; position: relative; border: 1px solid #222; border-radius: 10px; overflow: hidden; }
        
        /* লাল বাটন এবং পর্দার ডিজাইন */
        #ad-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 9999; 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }

        .red-play-btn {
            background: #ff0000;
            color: white;
            padding: 20px 45px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 35px rgba(255, 0, 0, 1);
            text-transform: uppercase;
            cursor: pointer;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 0, 0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 40px rgba(255, 0, 0, 1); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 0, 0.7); }
        }

        video { width: 100%; display: block; background: #000; }
        .v-title { padding: 15px; font-size: 20px; font-weight: bold; background: #111; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div id="vBox">
    <div class="v-title" id="videoTitle">লোডিং...</div>
    
    <div style="position: relative;">
        <div id="ad-overlay">
            <button class="red-play-btn" id="trigger-btn">🎬 প্লে করুন</button>
        </div>

        <video id="mainVideo" controls playsinline></video>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // আপনার ফায়ারবেস কনফিগ (স্ক্রিনশট অনুযায়ী misti-am)
    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');

    async function setupPlayer() {
        if (!videoId) return;

        try {
            const docRef = doc(db, "userVideos", videoId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('videoTitle').innerText = data.title;
                const videoElement = document.getElementById('mainVideo');
                videoElement.src = data.url; // ক্লাউডিনারি লিঙ্ক

                const overlay = document.getElementById('ad-overlay');
                
                // আপনার ডিরেক্ট অ্যাড লিঙ্ক (অ্যাডমিন প্যানেল থেকে পাঠানো থাকলে data.ad_link ব্যবহার করুন)
                const adLink = data.ad_link || "https://www.profitablecpmratenetwork.com/pzv..."; 

                overlay.onclick = () => {
                    // ১. নতুন উইন্ডোতে অ্যাড ওপেন হবে
                    window.open(adLink, '_blank');
                    
                    // ২. লাল বাটনসহ পর্দা সরে যাবে
                    overlay.style.display = 'none';
                    
                    // ৩. ভিডিও প্লে হবে
                    videoElement.play();
                };
            }
        } catch (e) {
            console.error("Error loading video: ", e);
        }
    }

    setupPlayer();
</script>
</body>
</html>
