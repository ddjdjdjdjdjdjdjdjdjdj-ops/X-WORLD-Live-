<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD | Live Player</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; text-align: center; }
        #vBox { width: 95%; max-width: 600px; margin: 20px auto; position: relative; border: 2px solid #333; border-radius: 12px; overflow: hidden; }
        
        /* লাল বাটন এবং কড়া পর্দা */
        #ad-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .red-play-btn {
            background: linear-gradient(145deg, #ff0000, #990000);
            color: white;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 1);
            text-transform: uppercase;
            cursor: pointer;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        video { width: 100%; display: block; border-radius: 0 0 10px 10px; }
        .v-header { background: #111; padding: 15px; font-size: 18px; font-weight: bold; border-bottom: 2px solid #222; color: #ff0000; }
    </style>
</head>
<body>

<div id="vBox">
    <div class="v-header" id="videoTitle">লোড হচ্ছে...</div>
    
    <div style="position: relative; min-height: 250px; background: #000;">
        <div id="ad-overlay">
            <button class="red-play-btn" id="playBtn">🎬 PLAY NOW</button>
            <p style="margin-top:15px; font-size:14px; color:#aaa;">অ্যাড কেটে দিয়ে ভিডিও দেখুন</p>
        </div>

        <video id="mainVideo" controls playsinline></video>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const vid = params.get('id');

    async function load() {
        if (!vid) return;
        const s = await getDoc(doc(db, "userVideos", vid));
        if (s.exists()) {
            const data = s.data();
            document.getElementById('videoTitle').innerText = data.title;
            const video = document.getElementById('mainVideo');
            video.src = data.url;

            // আপনার Monetag ডিরেক্ট লিঙ্ক। 
            // যদি আপনি অ্যাডমিন প্যানেল থেকে লিঙ্ক পাঠান, তবে data.ad_link ব্যবহার করুন।
            const myAd = data.ad_link || "https://www.profitablecpmratenetwork.com/pzv8624z?key=9013e8c9527f54c95f16e44b827e85c2"; 

            document.getElementById('ad-overlay').onclick = () => {
                // ১. নতুন ট্যাবে অ্যাড ওপেন হবে
                window.open(myAd, '_blank');
                // ২. লাল পর্দা সরে যাবে
                document.getElementById('ad-overlay').style.display = 'none';
                // ৩. ভিডিও চলবে
                video.play();
            };
        }
    }
    load();
</script>
</body>
</html>
