<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const videoList = document.getElementById('videoList');

    onSnapshot(query(collection(db, "userVideos"), orderBy("createdAt", "desc")), (snapshot) => {
        if (snapshot.empty) {
            document.getElementById('status').innerText = "এখনো কোনো ভিডিও নেই।";
            return;
        }

        videoList.innerHTML = ""; 
        let videoCount = 0;

        snapshot.forEach((doc) => {
            const data = doc.data();
            videoCount++;

            // ১. ভিডিও কার্ড
            const div = document.createElement('div');
            div.className = 'video-card';
            div.innerHTML = `
                <video controls><source src="${data.url}" type="video/mp4"></video>
                <div class="title">${data.title}</div>
            `;
            videoList.appendChild(div);

            // ২. প্রতি ২টা ভিডিওর পর অ্যাড
            if (videoCount % 2 === 0) {
                const adDiv = document.createElement('div');
                adDiv.className = 'ad-slot';
                const adId = 'ad-ready-' + videoCount;
                adDiv.innerHTML = `<span style="color:#666;font-size:10px;">ADVERTISEMENT</span><div id="${adId}"></div>`;
                videoList.appendChild(adDiv);

                // অ্যাড লোড করার বিশেষ টেকনিক
                setTimeout(() => {
                    const target = document.getElementById(adId);
                    if (target) {
                        // Clear previous if any
                        target.innerHTML = '';
                        
                        // Config Script
                        const conf = document.createElement('script');
                        conf.type = 'text/javascript';
                        conf.text = `atOptions = { 'key' : '6dd42e61fdb77100ae25a4653ee62d7f', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };`;
                        target.appendChild(conf);

                        // Invoke Script
                        const inv = document.createElement('script');
                        inv.type = 'text/javascript';
                        inv.src = 'https://www.highperformanceformat.com/6dd42e61fdb77100ae25a4653ee62d7f/invoke.js';
                        target.appendChild(inv);
                    }
                }, 500); // ভিডিও লোড হওয়ার হাফ সেকেন্ড পর অ্যাড ট্রিগার হবে
            }
        });
    });
                            </script>
