<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD Live</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; padding: 20px; width: 100%; border-bottom: 1px solid #333; }
        h1 { color: red; margin: 0; }
        #vBox { width: 100%; max-width: 500px; margin-top: 20px; }
        .v-card { position: relative; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        video { width: 100%; display: block; }
        .title { padding: 15px; font-size: 18px; font-weight: bold; text-align: center; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .play { width: 65px; height: 65px; background: red; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; margin-bottom: 10px; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
        .ad-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .skip-bar { width: 100%; text-align: center; }
        .s-btn { padding: 12px 25px; background: #333; color: #888; border: none; border-radius: 5px; cursor: not-allowed; font-size: 16px; }
        .s-btn.active { background: #fff; color: #000; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>X-WORLD Live</h1></header>
<div id="vBox">লোডিং হচ্ছে...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const vBox = document.getElementById('vBox');

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (id) {
        async function load() {
            try {
                const s = await getDoc(doc(db, "userVideos", id));
                if (s.exists()) {
                    const d = s.data();
                    vBox.innerHTML = `
                        <div class="v-card">
                            <div style="position:relative;">
                                <video id="vid" playsinline><source src="${d.url}"></video>
                                <div class="overlay" id="ovl">
                                    <div class="play">▶</div>
                                    <small>ভিডিও দেখতে ক্লিক করুন</small>
                                </div>
                                <div class="ad-layer" id="adl">
                                    <div class="skip-bar">
                                        <p id="tmr" style="color:yellow; margin-bottom:15px;">অ্যাড লোড হচ্ছে, অপেক্ষা করুন: 5s</p>
                                        <button class="s-btn" id="skp">Skip Ad</button>
                                    </div>
                                </div>
                            </div>
                            <div class="title">${d.title}</div>
                        </div>`;
                    
                    const ovl = document.getElementById('ovl');
                    const adl = document.getElementById('adl');
                    const skp = document.getElementById('skp');
                    const vid = document.getElementById('vid');
                    const tmr = document.getElementById('tmr');

                    ovl.onclick = () => {
                        // ১. প্লে বাটনে ক্লিক করলে নতুন ট্যাবে অ্যাড ওপেন হবে
                        window.open(d.adLink, "_blank");

                        // ২. মূল পেজে টাইমার শুরু হবে
                        ovl.style.display = 'none';
                        adl.style.display = 'flex';
                        let time = 5;
                        const interval = setInterval(() => {
                            time--;
                            tmr.innerText = "অপেক্ষা করুন: " + time + "s";
                            if(time <= 0) {
                                clearInterval(interval);
                                tmr.style.display = 'none';
                                skp.innerText = "Skip Ad ❯";
                                skp.classList.add('active');
                                skp.onclick = () => {
                                    adl.remove();
                                    vid.controls = true;
                                    vid.play();
                                };
                            }
                        }, 1000);
                    };
                } else { vBox.innerHTML = "ভিডিওটি খুঁজে পাওয়া যায়নি!"; }
            } catch (e) { vBox.innerHTML = "Error: " + e.message; }
        }
        load();
    } else {
        vBox.innerHTML = "সঠিক লিঙ্কে ক্লিক করুন।";
    }
</script>
</body>
</html>
