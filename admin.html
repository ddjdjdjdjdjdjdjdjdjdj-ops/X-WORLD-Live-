<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD Live</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #333; }
        h1 { color: red; margin: 0; }
        #videoContainer { max-width: 600px; margin: 20px auto; }
        .video-card { position: relative; background: #111; border: 1px solid #333; border-radius: 10px; overflow: hidden; }
        video { width: 100%; display: block; height: auto; }
        .title { padding: 15px; font-size: 18px; font-weight: bold; }
        .thumb-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 50; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-btn { width: 70px; height: 70px; background: red; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #fff; }
        .ad-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; flex-direction: column; }
        iframe { width: 100%; height: 85%; border: none; }
        .skip-section { width: 100%; height: 15%; background: #111; display: flex; align-items: center; justify-content: flex-end; padding-right: 15px; box-sizing: border-box; }
        .skip-btn { padding: 8px 15px; background: #333; color: #888; border: 1px solid #444; border-radius: 4px; cursor: not-allowed; }
        .skip-btn.active { background: #fff; color: #000; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>X-WORLD Live-</h1></header>
<div id="videoContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const container = document.getElementById('videoContainer');

    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');

    if (videoId) {
        const docRef = doc(db, "userVideos", videoId);
        getDoc(docRef).then((s) => {
            if (s.exists()) {
                const d = s.data();
                container.innerHTML = `
                    <div class="video-card">
                        <div style="position:relative;">
                            <video id="myVid" playsinline><source src="${d.url}"></video>
                            <div class="thumb-overlay" id="tOver"><div class="play-btn">▶</div></div>
                            <div class="ad-container" id="adBox">
                                <iframe src="${d.adLink}"></iframe>
                                <div class="skip-section">
                                    <span id="timer" style="margin-right:10px;">Wait 5s</span>
                                    <button class="skip-btn" id="sBtn">Skip Ad</button>
                                </div>
                            </div>
                        </div>
                        <div class="title">${d.title}</div>
                    </div>`;
                
                const tOver = document.getElementById('tOver');
                const adBox = document.getElementById('adBox');
                const sBtn = document.getElementById('sBtn');
                const myVid = document.getElementById('myVid');
                const timer = document.getElementById('timer');

                tOver.onclick = () => {
                    tOver.style.display = 'none';
                    adBox.style.display = 'flex';
                    let c = 5;
                    const it = setInterval(() => {
                        c--;
                        timer.innerText = "Wait " + c + "s";
                        if(c <= 0) {
                            clearInterval(it);
                            timer.style.display = 'none';
                            sBtn.innerText = "Skip Ad ❯";
                            sBtn.classList.add('active');
                            sBtn.onclick = () => {
                                adBox.remove();
                                myVid.controls = true;
                                myVid.play();
                            };
                        }
                    }, 1000);
                };
            } else { container.innerHTML = "<p>Video Not Found!</p>"; }
        });
    } else {
        container.innerHTML = "<h3 style='text-align:center;'>Welcome! Please use a direct video link.</h3>";
    }
</script>
</body>
</html>
